# ===== Server =====
server.port=8080
spring.application.name=Meridian ERP

# ===== Datasource (H2 file-based, persists across restarts) =====
spring.datasource.url=jdbc:h2:file:./data/erpdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== H2 Console =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Quote all identifiers so reserved words (value, order, key, user, …) are safe across modules
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# ===== SQL init (seed data) =====
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===== File upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
erp.upload.dir=uploads

# ===== Mail (mockable — logs instead of sending unless overridden) =====
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
erp.mail.enabled=false
erp.mail.from=no-reply@meridian-erp.com

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== Logging =====
logging.level.org.springframework.security=INFO
logging.level.com.erp=DEBUG

# ===== Modulith (relax verification at runtime) =====
spring.modulith.detection-strategy=explicitly-annotated
