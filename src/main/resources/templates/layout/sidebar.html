<!--
  Reusable nav-link fragment.
  href  : target URL
  label : link text
  match : URI prefix that marks this link active
  icon  : Lucide icon name (rendered via data-lucide)
-->
<th:block th:fragment="item(href, label, match, icon)">
    <a th:href="@{${href}}"
       th:classappend="${currentUri != null and #strings.startsWith(currentUri, match)}
            ? 'bg-white/10 text-white shadow-sm ring-1 ring-white/10'
            : 'text-slate-400 hover:text-white hover:bg-white/5'"
       class="group relative flex items-center gap-3 px-3 py-2 rounded-lg transition-all duration-150">
        <span th:if="${currentUri != null and #strings.startsWith(currentUri, match)}"
              class="absolute left-0 top-1/2 -translate-y-1/2 h-5 w-1 rounded-full bg-brand"></span>
        <i th:attr="data-lucide=${icon}" class="w-[18px] h-[18px] shrink-0"></i>
        <span th:text="${label}" class="truncate">Item</span>
    </a>
</th:block>

<th:block th:fragment="group(title)">
    <p class="px-3 mb-1 text-[10px] font-semibold uppercase tracking-[0.12em] text-slate-500" th:text="${title}">Section</p>
</th:block>
