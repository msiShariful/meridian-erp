<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  Reusable nav-link fragment.
  href  : target URL
  label : link text
  match : URI prefix that marks this link active
-->
<th:block th:fragment="item(href, label, match)">
    <a th:href="@{${href}}"
       th:classappend="${currentUri != null and #strings.startsWith(currentUri, match)} ? 'bg-brand/15 text-white border-l-2 border-brand' : 'text-slate-400 hover:text-white hover:bg-white/5 border-l-2 border-transparent'"
       class="flex items-center gap-3 pl-5 pr-3 py-2 rounded-r-lg transition-colors">
        <span class="w-1.5 h-1.5 rounded-full bg-current opacity-60"></span>
        <span th:text="${label}">Item</span>
    </a>
</th:block>

<th:block th:fragment="group(title)">
    <p class="px-3 text-[11px] font-semibold uppercase tracking-wider text-slate-500" th:text="${title}">Section</p>
</th:block>
