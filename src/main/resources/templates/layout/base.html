<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE · $LAYOUT_TITLE" th:text="${appName}">Meridian ERP</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0f172a',
                        'navy-light': '#1e293b',
                        brand: '#6366f1',
                        'brand-dark': '#4f46e5',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    },
                    fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <th:block layout:fragment="head"></th:block>
</head>
<body class="font-sans bg-slate-100 text-slate-800 antialiased"
      x-data="{ sidebarOpen: false }">

<div class="min-h-screen flex">

    <!-- ============ SIDEBAR ============ -->
    <aside class="fixed inset-y-0 left-0 z-40 w-[260px] bg-navy text-slate-300 flex flex-col transition-transform duration-200 lg:translate-x-0"
           :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">
        <!-- Brand -->
        <div class="h-16 flex items-center gap-3 px-6 border-b border-white/5">
            <div class="w-9 h-9 rounded-lg bg-brand flex items-center justify-center font-extrabold text-white">M</div>
            <span class="text-white font-bold text-lg tracking-tight">Meridian</span>
        </div>

        <!-- Nav -->
        <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-6 text-sm">
            <div th:replace="~{layout/sidebar :: nav}"></div>
        </nav>

        <!-- User card -->
        <div class="border-t border-white/5 p-4" sec:authorize="isAuthenticated()">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-brand/20 text-brand flex items-center justify-center font-semibold"
                     th:text="${currentUser != null ? currentUser.initials : 'U'}">U</div>
                <div class="min-w-0">
                    <p class="text-white text-sm font-medium truncate"
                       th:text="${currentUser != null ? currentUser.fullName : 'User'}">User</p>
                    <p class="text-xs text-brand truncate"
                       th:text="${currentUser != null ? currentUser.primaryRoleDisplay : ''}">Role</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Mobile overlay -->
    <div class="fixed inset-0 bg-black/40 z-30 lg:hidden" x-show="sidebarOpen" x-cloak @click="sidebarOpen=false"></div>

    <!-- ============ MAIN ============ -->
    <div class="flex-1 flex flex-col lg:ml-[260px] min-w-0">

        <!-- Topbar -->
        <header class="sticky top-0 z-20 h-16 bg-white border-b border-slate-200 flex items-center gap-4 px-4 lg:px-6">
            <button class="lg:hidden text-slate-600" @click="sidebarOpen=true" aria-label="Open menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>

            <div class="hidden md:flex items-center flex-1 max-w-md">
                <div class="relative w-full">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
                    <input type="search" placeholder="Search…"
                           class="w-full pl-9 pr-3 py-2 text-sm rounded-lg bg-slate-100 border border-transparent focus:bg-white focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                </div>
            </div>

            <div class="flex items-center gap-3 ml-auto">
                <!-- Notifications -->
                <a th:href="@{/notifications}" class="relative p-2 rounded-lg hover:bg-slate-100" aria-label="Notifications">
                    <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                    <span th:if="${notificationCount != null and notificationCount > 0}"
                          class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1 rounded-full bg-danger text-white text-[10px] font-bold flex items-center justify-center"
                          th:text="${notificationCount}">3</span>
                </a>

                <!-- User dropdown -->
                <div class="relative" x-data="{ open: false }" sec:authorize="isAuthenticated()">
                    <button @click="open=!open" class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-slate-100">
                        <span class="w-8 h-8 rounded-full bg-brand text-white flex items-center justify-center text-sm font-semibold"
                              th:text="${currentUser != null ? currentUser.initials : 'U'}">U</span>
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div x-show="open" x-cloak @click.outside="open=false"
                         class="absolute right-0 mt-2 w-52 bg-white rounded-xl shadow-lg border border-slate-200 py-2 text-sm">
                        <div class="px-4 py-2 border-b border-slate-100">
                            <p class="font-medium text-slate-800" th:text="${currentUser != null ? currentUser.fullName : ''}">User</p>
                            <p class="text-xs text-slate-500" th:text="${currentUser != null ? currentUser.username : ''}">email</p>
                        </div>
                        <a th:href="@{/profile}" class="block px-4 py-2 hover:bg-slate-50">My Profile</a>
                        <a th:href="@{/settings/company}" class="block px-4 py-2 hover:bg-slate-50" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN')">Settings</a>
                        <form th:action="@{/logout}" method="post" class="border-t border-slate-100 mt-1 pt-1">
                            <button type="submit" class="w-full text-left px-4 py-2 text-danger hover:bg-red-50">Sign out</button>
                        </form>
                    </div>
                </div>
            </div>
        </header>

        <!-- Flash messages -->
        <div class="px-4 lg:px-6 pt-4" th:if="${successMessage != null or errorMessage != null}">
            <div th:if="${successMessage}" x-data="{show:true}" x-show="show"
                 class="flex items-center gap-3 bg-emerald-50 border border-emerald-200 text-emerald-800 px-4 py-3 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                <span th:text="${successMessage}"></span>
                <button @click="show=false" class="ml-auto text-emerald-600">&times;</button>
            </div>
            <div th:if="${errorMessage}" x-data="{show:true}" x-show="show"
                 class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span th:text="${errorMessage}"></span>
                <button @click="show=false" class="ml-auto text-red-600">&times;</button>
            </div>
        </div>

        <!-- Page content -->
        <main class="flex-1 p-4 lg:p-6" layout:fragment="content">
            <p>Page content goes here.</p>
        </main>

        <footer class="px-6 py-4 text-center text-xs text-slate-400 border-t border-slate-200">
            <span th:text="${appName}">Meridian ERP</span> &copy; 2026 · Built with Spring Boot &amp; Thymeleaf
        </footer>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
