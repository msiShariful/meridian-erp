<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password · Meridian ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { navy:'#0f172a', brand:'#6366f1','brand-dark':'#4f46e5' }, fontFamily:{ sans:['Inter','ui-sans-serif'] } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-slate-100 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-brand flex items-center justify-center font-extrabold text-white">M</div>
        <span class="text-xl font-bold text-navy">Meridian ERP</span>
    </div>
    <h2 class="text-2xl font-bold text-slate-800">Reset your password</h2>
    <p class="text-slate-500 mt-1 mb-6">Enter your email and we'll send you a reset link.</p>
    <form class="space-y-4" onsubmit="event.preventDefault(); this.querySelector('#sent').classList.remove('hidden');">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
            <input type="email" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
        </div>
        <div id="sent" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm px-4 py-3 rounded-lg">
            If an account exists for that email, a reset link has been sent.
        </div>
        <button type="submit" class="w-full bg-brand hover:bg-brand-dark text-white font-semibold py-2.5 rounded-lg">Send reset link</button>
    </form>
    <a th:href="@{/login}" class="block text-center text-sm text-brand font-medium hover:underline mt-6">&larr; Back to sign in</a>
</div>
</body>
</html>
