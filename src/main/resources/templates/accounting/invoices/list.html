<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Invoices</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('Accounting', '', 'Invoices')}"></div>

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Invoices</h1>
            <p class="text-slate-500 text-sm mt-1">Manage customer invoices and payments.</p>
        </div>
        <a sec:authorize="hasAuthority('ACCOUNTING_EDIT')" th:href="@{/accounting/invoices/new}" class="px-4 py-2 text-sm font-medium rounded-lg bg-brand hover:bg-brand-dark text-white">+ New Invoice</a>
    </div>

    <form th:action="@{/accounting/invoices}" method="get" class="flex flex-col sm:flex-row gap-3 mb-4">
        <div class="relative flex-1 max-w-sm">
            <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
            <input type="search" name="q" th:value="${q}" placeholder="Search invoices…"
                   class="w-full pl-9 pr-3 py-2 text-sm rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
        </div>
        <select name="status" onchange="this.form.submit()"
                class="px-3 py-2 text-sm rounded-lg border border-slate-300 focus:border-brand outline-none">
            <option value="">All statuses</option>
            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}" th:selected="${s == statusFilter}"></option>
        </select>
        <button class="px-4 py-2 text-sm rounded-lg bg-slate-800 text-white">Filter</button>
    </form>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div th:if="${invoices.isEmpty()}"><div th:replace="~{layout/components :: emptyState('No invoices found', 'Create your first invoice to start billing customers.', '/accounting/invoices/new', '+ New Invoice')}"></div></div>

        <table th:unless="${invoices.isEmpty()}" class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-left">
                <tr>
                    <th class="px-5 py-3 font-medium">Invoice #</th>
                    <th class="px-5 py-3 font-medium">Customer</th>
                    <th class="px-5 py-3 font-medium">Issue Date</th>
                    <th class="px-5 py-3 font-medium">Due Date</th>
                    <th class="px-5 py-3 font-medium text-right">Total</th>
                    <th class="px-5 py-3 font-medium">Status</th>
                    <th class="px-5 py-3 font-medium text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="invoice : ${invoices.content}" class="hover:bg-slate-50">
                    <td class="px-5 py-3">
                        <a th:href="@{/accounting/invoices/{id}(id=${invoice.id})}" class="font-mono font-medium text-slate-700 hover:text-brand" th:text="${invoice.invoiceNumber}">INV-0001</a>
                    </td>
                    <td class="px-5 py-3 text-slate-700" th:text="${invoice.customerName}">Customer</td>
                    <td class="px-5 py-3 text-slate-600" th:text="${#temporals.format(invoice.issueDate, 'dd MMM yyyy')}">date</td>
                    <td class="px-5 py-3 text-slate-600" th:text="${invoice.dueDate != null ? #temporals.format(invoice.dueDate, 'dd MMM yyyy') : '—'}">date</td>
                    <td class="px-5 py-3 text-right text-slate-700 whitespace-nowrap">৳ <span th:text="${#numbers.formatDecimal(invoice.total, 1, 'COMMA', 2, 'POINT')}">0</span></td>
                    <td class="px-5 py-3">
                        <span th:replace="~{layout/components :: badge(${invoice.status.label}, ${invoice.status.color})}"></span>
                    </td>
                    <td class="px-5 py-3 text-right whitespace-nowrap">
                        <a sec:authorize="hasAuthority('ACCOUNTING_EDIT')" th:href="@{/accounting/invoices/{id}/edit(id=${invoice.id})}" class="text-slate-400 hover:text-brand px-1.5" title="Edit">✎</a>
                        <form sec:authorize="hasAuthority('ACCOUNTING_EDIT')" th:action="@{/accounting/invoices/{id}/delete(id=${invoice.id})}" method="post" class="inline" data-confirm="Delete this invoice?">
                            <button class="text-slate-400 hover:text-danger px-1.5" title="Delete">🗑</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:replace="~{layout/components :: pagination(${invoices}, '/accounting/invoices', ${q})}"></div>
    </div>
</div>
</body>
</html>
