<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title th:text="${order.orderNumber}">Order</title>
    <style>
        @media print {
            body * { visibility: hidden; }
            #invoice, #invoice * { visibility: visible; }
            #invoice { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('Orders', '/ecommerce/orders', ${pageTitle})}"></div>

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 no-print">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold text-slate-800" th:text="${order.orderNumber}">ORD-0001</h1>
            <span th:replace="~{layout/components :: badge(${order.status.label}, ${order.status.color})}"></span>
        </div>
        <div class="flex gap-2 items-center">
            <button onclick="window.print()" class="px-4 py-2 text-sm font-medium rounded-lg bg-white border border-slate-300 hover:bg-slate-50">Print invoice</button>
            <form sec:authorize="hasAuthority('ECOMMERCE_EDIT')" th:action="@{/ecommerce/orders/{id}/status(id=${order.id})}" method="post" class="flex items-center gap-2">
                <select name="status" class="px-3 py-2 text-sm rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}" th:selected="${s == order.status}"></option>
                </select>
                <button class="px-4 py-2 text-sm font-medium rounded-lg bg-brand hover:bg-brand-dark text-white">Update</button>
            </form>
            <form sec:authorize="hasAuthority('ECOMMERCE_EDIT')" th:action="@{/ecommerce/orders/{id}/delete(id=${order.id})}" method="post" data-confirm="Delete this order?">
                <button class="px-4 py-2 text-sm font-medium rounded-lg bg-white border border-slate-300 text-danger hover:bg-red-50">Delete</button>
            </form>
        </div>
    </div>

    <div id="invoice" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg bg-brand flex items-center justify-center font-extrabold text-white">M</div>
                        <div>
                            <p class="font-bold text-slate-800">Meridian ERP</p>
                            <p class="text-xs text-slate-400">Invoice</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-slate-800" th:text="${order.orderNumber}">ORD-0001</p>
                        <p class="text-xs text-slate-400" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">date</p>
                    </div>
                </div>

                <table class="w-full text-sm">
                    <thead class="bg-slate-50 text-slate-500 text-left">
                        <tr>
                            <th class="px-4 py-2 font-medium">Product</th>
                            <th class="px-4 py-2 font-medium text-center">Qty</th>
                            <th class="px-4 py-2 font-medium text-right">Unit Price</th>
                            <th class="px-4 py-2 font-medium text-right">Line Total</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="item : ${order.items}">
                            <td class="px-4 py-2 text-slate-700" th:text="${item.productName}">Product</td>
                            <td class="px-4 py-2 text-center text-slate-600" th:text="${item.quantity}">1</td>
                            <td class="px-4 py-2 text-right text-slate-600">৳ <span th:text="${#numbers.formatInteger(item.unitPrice, 1, 'COMMA')}">0</span></td>
                            <td class="px-4 py-2 text-right text-slate-700">৳ <span th:text="${#numbers.formatInteger(item.lineTotal, 1, 'COMMA')}">0</span></td>
                        </tr>
                    </tbody>
                </table>

                <div class="mt-6 flex justify-end">
                    <dl class="w-full max-w-xs text-sm space-y-2">
                        <div class="flex justify-between"><dt class="text-slate-500">Subtotal</dt><dd class="text-slate-700">৳ <span th:text="${#numbers.formatInteger(order.subtotal, 1, 'COMMA')}">0</span></dd></div>
                        <div class="flex justify-between" th:if="${order.discount != null and order.discount.signum() > 0}">
                            <dt class="text-slate-500">Discount <span th:if="${order.couponCode}" class="text-xs text-slate-400" th:text="'(' + ${order.couponCode} + ')'"></span></dt>
                            <dd class="text-emerald-600">– ৳ <span th:text="${#numbers.formatInteger(order.discount, 1, 'COMMA')}">0</span></dd>
                        </div>
                        <div class="flex justify-between"><dt class="text-slate-500">Shipping</dt><dd class="text-slate-700">৳ <span th:text="${#numbers.formatInteger(order.shipping, 1, 'COMMA')}">0</span></dd></div>
                        <div class="flex justify-between border-t border-slate-200 pt-2 font-semibold text-base"><dt class="text-slate-800">Total</dt><dd class="text-slate-900">৳ <span th:text="${#numbers.formatInteger(order.total, 1, 'COMMA')}">0</span></dd></div>
                    </dl>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                <h2 class="font-semibold text-slate-800 mb-4">Customer</h2>
                <dl class="text-sm space-y-3">
                    <div><dt class="text-slate-400">Name</dt><dd class="text-slate-700" th:text="${order.customerName}">Name</dd></div>
                    <div><dt class="text-slate-400">Email</dt><dd class="text-slate-700" th:text="${order.customerEmail} ?: '—'">email</dd></div>
                    <div><dt class="text-slate-400">Payment method</dt><dd class="text-slate-700" th:text="${order.paymentMethod} ?: '—'">COD</dd></div>
                </dl>
            </div>
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                <h2 class="font-semibold text-slate-800 mb-4">Shipping Address</h2>
                <p class="text-sm text-slate-600 whitespace-pre-line" th:text="${order.shippingAddress} ?: '—'">Address</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
