<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Orders</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('E-Commerce', '', 'Orders')}"></div>

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Orders</h1>
            <p class="text-slate-500 text-sm mt-1">Manage storefront orders and fulfilment.</p>
        </div>
        <div class="flex gap-2">
            <a th:href="@{/shop}" target="_blank" class="px-4 py-2 text-sm font-medium rounded-lg bg-white border border-slate-300 hover:bg-slate-50">View storefront</a>
            <a sec:authorize="hasAuthority('ECOMMERCE_EDIT')" th:href="@{/ecommerce/orders/new}" class="px-4 py-2 text-sm font-medium rounded-lg bg-brand hover:bg-brand-dark text-white">+ New Order</a>
        </div>
    </div>

    <!-- Filters -->
    <form th:action="@{/ecommerce/orders}" method="get" class="flex flex-col sm:flex-row gap-3 mb-4">
        <div class="relative flex-1 max-w-sm">
            <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
            <input type="search" name="q" th:value="${q}" placeholder="Search orders…"
                   class="w-full pl-9 pr-3 py-2 text-sm rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
        </div>
        <select name="status" onchange="this.form.submit()"
                class="px-3 py-2 text-sm rounded-lg border border-slate-300 focus:border-brand outline-none">
            <option value="">All statuses</option>
            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}" th:selected="${s == statusFilter}"></option>
        </select>
        <button class="px-4 py-2 text-sm rounded-lg bg-slate-800 text-white">Filter</button>
    </form>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div th:if="${orders.isEmpty()}"><div th:replace="~{layout/components :: emptyState('No orders found', 'Orders placed in the storefront will appear here.', '/shop', 'Open storefront')}"></div></div>

        <table th:unless="${orders.isEmpty()}" class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-left">
                <tr>
                    <th class="px-5 py-3 font-medium">Order #</th>
                    <th class="px-5 py-3 font-medium">Customer</th>
                    <th class="px-5 py-3 font-medium">Items</th>
                    <th class="px-5 py-3 font-medium">Total</th>
                    <th class="px-5 py-3 font-medium">Date</th>
                    <th class="px-5 py-3 font-medium">Status</th>
                    <th class="px-5 py-3 font-medium text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="order : ${orders.content}" class="hover:bg-slate-50">
                    <td class="px-5 py-3">
                        <a th:href="@{/ecommerce/orders/{id}(id=${order.id})}" class="font-medium text-slate-700 hover:text-brand" th:text="${order.orderNumber}">ORD-0001</a>
                    </td>
                    <td class="px-5 py-3">
                        <span class="text-slate-700" th:text="${order.customerName}">Customer</span>
                        <span class="block text-xs text-slate-400" th:text="${order.customerEmail} ?: '—'">email</span>
                    </td>
                    <td class="px-5 py-3 text-slate-600" th:text="${order.totalQuantity}">3</td>
                    <td class="px-5 py-3 text-slate-700">৳ <span th:text="${#numbers.formatInteger(order.total, 1, 'COMMA')}">0</span></td>
                    <td class="px-5 py-3 text-slate-500" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">date</td>
                    <td class="px-5 py-3">
                        <span th:replace="~{layout/components :: badge(${order.status.label}, ${order.status.color})}"></span>
                    </td>
                    <td class="px-5 py-3 text-right whitespace-nowrap">
                        <a th:href="@{/ecommerce/orders/{id}(id=${order.id})}" class="text-slate-400 hover:text-brand px-1.5" title="View">View</a>
                        <form sec:authorize="hasAuthority('ECOMMERCE_EDIT')" th:action="@{/ecommerce/orders/{id}/delete(id=${order.id})}" method="post" class="inline" data-confirm="Delete this order?">
                            <button class="text-slate-400 hover:text-danger px-1.5" title="Delete">🗑</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:replace="~{layout/components :: pagination(${orders}, '/ecommerce/orders', ${q})}"></div>
    </div>
</div>
</body>
</html>
