<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">Order</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('Orders', '/ecommerce/orders', ${pageTitle})}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6" th:text="${pageTitle}">New Order</h1>

    <form th:action="@{/ecommerce/orders/save}" th:object="${order}" method="post" class="max-w-3xl">
        <input type="hidden" th:field="*{id}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Customer name <span class="text-danger">*</span></label>
                <input th:field="*{customerName}" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Customer email</label>
                <input type="email" th:field="*{customerEmail}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Status</label>
                <select th:field="*{status}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"></option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Payment method</label>
                <input th:field="*{paymentMethod}" placeholder="COD / Card / bKash" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Shipping address</label>
                <textarea th:field="*{shippingAddress}" rows="2" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none"></textarea>
            </div>

            <div class="sm:col-span-2 border-t border-slate-100 pt-4">
                <p class="text-sm font-semibold text-slate-700 mb-3">Line item</p>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1.5">Product name</label>
                        <input name="productName" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1.5">Quantity</label>
                        <input type="number" name="quantity" min="1" value="1" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1.5">Unit price (৳)</label>
                        <input type="number" step="0.01" min="0" name="unitPrice" value="0" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    </div>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Discount (৳)</label>
                <input type="number" step="0.01" min="0" th:field="*{discount}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Shipping (৳)</label>
                <input type="number" step="0.01" min="0" th:field="*{shipping}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
            </div>
        </div>

        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save Order</button>
            <a th:href="@{/ecommerce/orders}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
