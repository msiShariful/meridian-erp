<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">Customer</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('Customers', '/ecommerce/customers', ${pageTitle})}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6" th:text="${pageTitle}">New Customer</h1>

    <form th:action="@{/ecommerce/customers/save}" th:object="${customer}" method="post" class="max-w-3xl">
        <input type="hidden" th:field="*{id}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Name <span class="text-danger">*</span></label>
                <input th:field="*{name}" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <input type="email" th:field="*{email}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Phone</label>
                <input th:field="*{phone}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Orders count</label>
                <input type="number" min="0" th:field="*{ordersCount}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Total spent (৳)</label>
                <input type="number" step="0.01" min="0" th:field="*{totalSpent}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
            </div>
            <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Address</label>
                <textarea th:field="*{address}" rows="2" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none"></textarea>
            </div>
        </div>

        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save Customer</button>
            <a th:href="@{/ecommerce/customers}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
