<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">User</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Users', '/settings/users', ${pageTitle})}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6" th:text="${pageTitle}">User</h1>

    <form th:action="@{/settings/users/save}" method="post" class="max-w-2xl">
        <input type="hidden" name="id" th:if="${editUser != null}" th:value="${editUser.id}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Full name</label>
                <input name="fullName" required th:value="${editUser != null ? editUser.fullName : ''}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Job title</label>
                <input name="jobTitle" th:value="${editUser != null ? editUser.jobTitle : ''}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div th:if="${editUser == null}"><label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <input type="email" name="email" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div th:if="${editUser == null}"><label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                <input type="text" name="password" placeholder="Default: Admin@1234" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div th:if="${editUser != null}" class="sm:col-span-2">
                <label class="flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" name="enabled" value="true" th:checked="${editUser.enabled}" class="rounded border-slate-300 text-brand"> Account enabled</label>
            </div>
            <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-2">Roles</label>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                    <label th:each="r : ${roles}" class="flex items-center gap-2 text-sm text-slate-600 border border-slate-200 rounded-lg px-3 py-2 hover:bg-slate-50">
                        <input type="checkbox" name="roles" th:value="${r.name}"
                               th:checked="${editUser != null and #lists.contains(editUser.roleNames, r.name)}"
                               class="rounded border-slate-300 text-brand">
                        <span th:text="${r.displayName} ?: ${r.name}">Role</span>
                    </label>
                </div>
            </div>
        </div>
        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save User</button>
            <a th:href="@{/settings/users}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
