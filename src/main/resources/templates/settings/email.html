<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Email Settings</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Settings', '', 'Email')}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-4">Settings</h1>
    <div th:replace="~{settings/_nav :: tabs('email')}"></div>

    <form th:action="@{/settings/email}" th:object="${email}" method="post" class="max-w-2xl mt-6">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">SMTP host</label>
                <input th:field="*{smtpHost}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">SMTP port</label>
                <input type="number" th:field="*{smtpPort}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
                <input th:field="*{username}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                <input type="password" th:field="*{password}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">From address</label>
                <input th:field="*{fromAddress}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div class="flex items-end"><label class="flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" th:field="*{tlsEnabled}" class="rounded border-slate-300 text-brand"> Enable TLS</label></div>
        </div>
        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save settings</button>
        </div>
    </form>

    <form th:action="@{/settings/email/test}" method="post" class="max-w-2xl mt-4 bg-white rounded-xl border border-slate-200 shadow-sm p-6">
        <h2 class="font-semibold text-slate-800 mb-3">Send Test Email</h2>
        <div class="flex gap-2">
            <input name="to" type="email" required placeholder="recipient@example.com" class="flex-1 px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
            <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white font-semibold px-5 py-2.5 rounded-lg whitespace-nowrap">Send test</button>
        </div>
    </form>
</div>
</body>
</html>
