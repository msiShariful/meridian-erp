<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Role Management</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Settings', '', 'Roles')}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-4">Settings</h1>
    <div th:replace="~{settings/_nav :: tabs('roles')}"></div>

    <div class="mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-slate-50 text-slate-500 text-left">
                    <tr><th class="px-5 py-3 font-medium">Role</th><th class="px-5 py-3 font-medium">Permissions</th><th class="px-5 py-3 font-medium text-right">Actions</th></tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr th:each="r : ${roles}" class="hover:bg-slate-50">
                        <td class="px-5 py-3"><p class="font-medium text-slate-700" th:text="${r.displayName} ?: ${r.name}">Role</p>
                            <p class="text-xs text-slate-400" th:text="${r.name}">CODE</p></td>
                        <td class="px-5 py-3 text-slate-500" th:text="${r.permissions.size()} + ' permissions'">0</td>
                        <td class="px-5 py-3 text-right"><a th:href="@{/settings/roles/{id}/edit(id=${r.id})}" class="text-brand text-sm font-medium hover:underline">Edit matrix</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <h2 class="font-semibold text-slate-800 mb-4">New Role</h2>
            <form th:action="@{/settings/roles/save}" method="post" class="space-y-3">
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Name (code)</label>
                    <input name="name" required placeholder="REGIONAL_MANAGER" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Display name</label>
                    <input name="displayName" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
                    <input name="description" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
                <button type="submit" class="w-full bg-brand hover:bg-brand-dark text-white font-semibold py-2.5 rounded-lg">Create Role</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
