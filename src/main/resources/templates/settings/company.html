<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Company Settings</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Settings', '', 'Company')}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-4">Settings</h1>
    <div th:replace="~{settings/_nav :: tabs('company')}"></div>

    <form th:action="@{/settings/company}" th:object="${company}" method="post" enctype="multipart/form-data" class="max-w-3xl mt-6">
        <input type="hidden" th:field="*{logo}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Company name</label>
                <input th:field="*{companyName}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <input th:field="*{email}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Phone</label>
                <input th:field="*{phone}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Website</label>
                <input th:field="*{website}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Currency</label>
                <select th:field="*{currency}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option value="BDT">BDT (৳)</option><option value="USD">USD ($)</option><option value="EUR">EUR (€)</option><option value="INR">INR (₹)</option></select></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Timezone</label>
                <input th:field="*{timezone}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Fiscal year start</label>
                <input th:field="*{fiscalYearStart}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Address</label>
                <textarea th:field="*{address}" rows="2" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></textarea></div>
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Logo</label>
                <input type="file" name="logoFile" accept="image/*" class="w-full text-sm text-slate-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-indigo-50 file:text-brand"></div>
        </div>
        <div class="mt-5"><button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save settings</button></div>
    </form>
</div>
</body>
</html>
