<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Audit Log</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Settings', '', 'Audit Log')}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-4">Settings</h1>
    <div th:replace="~{settings/_nav :: tabs('audit')}"></div>

    <form th:action="@{/settings/audit}" method="get" class="flex flex-col sm:flex-row gap-3 mt-6 mb-4">
        <input type="search" name="q" th:value="${q}" placeholder="Search actor / entity…" class="flex-1 max-w-sm px-3 py-2 text-sm rounded-lg border border-slate-300 focus:border-brand outline-none">
        <select name="action" onchange="this.form.submit()" class="px-3 py-2 text-sm rounded-lg border border-slate-300 outline-none">
            <option value="">All actions</option>
            <option th:each="a : ${ {'CREATE','UPDATE','DELETE'} }" th:value="${a}" th:text="${a}" th:selected="${a == actionFilter}"></option>
        </select>
        <button class="px-4 py-2 text-sm rounded-lg bg-slate-800 text-white">Filter</button>
    </form>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div th:if="${logs.isEmpty()}"><div th:replace="~{layout/components :: emptyState('No audit entries', 'Actions performed by signed-in users will appear here.', null, null)}"></div></div>
        <table th:unless="${logs.isEmpty()}" class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-left">
                <tr><th class="px-5 py-3 font-medium">When</th><th class="px-5 py-3 font-medium">Actor</th><th class="px-5 py-3 font-medium">Action</th><th class="px-5 py-3 font-medium">Entity</th><th class="px-5 py-3 font-medium">Details</th><th class="px-5 py-3 font-medium">IP</th></tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="l : ${logs.content}" class="hover:bg-slate-50">
                    <td class="px-5 py-3 text-slate-500 whitespace-nowrap" th:text="${l.createdAt != null ? #temporals.format(l.createdAt, 'dd MMM, HH:mm:ss') : ''}">time</td>
                    <td class="px-5 py-3 text-slate-700" th:text="${l.actor}">actor</td>
                    <td class="px-5 py-3"><span th:replace="~{layout/components :: badge(${l.action}, ${l.actionColor})}"></span></td>
                    <td class="px-5 py-3 text-slate-600" th:text="${l.entityType}">Entity</td>
                    <td class="px-5 py-3 text-slate-400 text-xs truncate max-w-xs" th:text="${l.details}">details</td>
                    <td class="px-5 py-3 text-slate-400 text-xs" th:text="${l.ipAddress}">ip</td>
                </tr>
            </tbody>
        </table>
        <div th:replace="~{layout/components :: pagination(${logs}, '/settings/audit', ${q})}"></div>
    </div>
</div>
</body>
</html>
