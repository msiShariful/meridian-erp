<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">Contact</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Contacts', '/crm/contacts', ${pageTitle})}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6" th:text="${pageTitle}">Contact</h1>

    <form th:action="@{/crm/contacts/save}" th:object="${contact}" method="post" class="max-w-3xl">
        <input type="hidden" th:field="*{id}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">First name <span class="text-danger">*</span></label>
                <input th:field="*{firstName}" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="text-xs text-danger mt-1"></p></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Last name</label>
                <input th:field="*{lastName}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <input type="email" th:field="*{email}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Phone</label>
                <input th:field="*{phone}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Job title</label>
                <input th:field="*{jobTitle}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Company</label>
                <select name="companyId" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option value="">No company</option>
                    <option th:each="co : ${companies}" th:value="${co.id}" th:text="${co.name}" th:selected="${contact.company != null and contact.company.id == co.id}"></option>
                </select></div>
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Tags (comma-separated)</label>
                <input th:field="*{tags}" placeholder="vip, decision-maker" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
        </div>
        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save Contact</button>
            <a th:href="@{/crm/contacts}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
