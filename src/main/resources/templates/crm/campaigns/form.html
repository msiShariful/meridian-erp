<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">Campaign</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Campaigns', '/crm/campaigns', ${pageTitle})}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6" th:text="${pageTitle}">Campaign</h1>

    <form th:action="@{/crm/campaigns/save}" th:object="${campaign}" method="post" class="max-w-3xl">
        <input type="hidden" th:field="*{id}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Campaign name <span class="text-danger">*</span></label>
                <input th:field="*{name}" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-xs text-danger mt-1"></p></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Type</label>
                <select th:field="*{type}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option th:each="t : ${types}" th:value="${t}" th:text="${t.label}"></option></select></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Status</label>
                <select th:field="*{status}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"></option></select></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Budget (৳)</label>
                <input type="number" step="0.01" min="0" th:field="*{budget}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Revenue (৳)</label>
                <input type="number" step="0.01" min="0" th:field="*{revenue}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Start date</label>
                <input type="date" th:field="*{startDate}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">End date</label>
                <input type="date" th:field="*{endDate}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Leads generated</label>
                <input type="number" min="0" th:field="*{leadsGenerated}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
                <textarea th:field="*{description}" rows="3" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></textarea></div>
        </div>
        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save Campaign</button>
            <a th:href="@{/crm/campaigns}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
