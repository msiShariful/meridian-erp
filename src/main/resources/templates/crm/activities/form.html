<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">Activity</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Activities', '/crm/activities', 'Log Activity')}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6">Log Activity</h1>

    <form th:action="@{/crm/activities/save}" th:object="${activity}" method="post" class="max-w-2xl">
        <input type="hidden" th:field="*{id}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Type</label>
                <select th:field="*{type}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option th:each="t : ${types}" th:value="${t}" th:text="${t.label}"></option></select></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Assigned to</label>
                <input th:field="*{assignedTo}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Subject <span class="text-danger">*</span></label>
                <input th:field="*{subject}" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                <p th:if="${#fields.hasErrors('subject')}" th:errors="*{subject}" class="text-xs text-danger mt-1"></p></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Due date</label>
                <input type="datetime-local" th:field="*{dueDate}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div class="flex items-end"><label class="flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" th:field="*{completed}" class="rounded border-slate-300 text-brand"> Mark as completed</label></div>
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Notes</label>
                <textarea th:field="*{notes}" rows="3" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></textarea></div>
        </div>
        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save Activity</button>
            <a th:href="@{/crm/activities}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
