<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">Company</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Companies', '/crm/companies', ${pageTitle})}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6" th:text="${pageTitle}">Company</h1>

    <form th:action="@{/crm/companies/save}" th:object="${company}" method="post" enctype="multipart/form-data" class="max-w-3xl">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{logo}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Company name <span class="text-danger">*</span></label>
                <input th:field="*{name}" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-xs text-danger mt-1"></p>
            </div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Industry</label>
                <input th:field="*{industry}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Company size</label>
                <select th:field="*{companySize}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option value="">Select…</option><option>1-10</option><option>11-50</option><option>51-200</option><option>201-500</option><option>500+</option>
                </select></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Website</label>
                <input th:field="*{website}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <input type="email" th:field="*{email}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Phone</label>
                <input th:field="*{phone}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Logo</label>
                <input type="file" name="logoFile" accept="image/*" class="w-full text-sm text-slate-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-indigo-50 file:text-brand"></div>
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Address</label>
                <input th:field="*{address}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
                <textarea th:field="*{description}" rows="3" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></textarea></div>
        </div>
        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save Company</button>
            <a th:href="@{/crm/companies}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
