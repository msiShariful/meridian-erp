<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">Deal</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Deals', '/crm/deals', ${pageTitle})}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6" th:text="${pageTitle}">Deal</h1>

    <form th:action="@{/crm/deals/save}" th:object="${deal}" method="post" class="max-w-3xl">
        <input type="hidden" th:field="*{id}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Deal title <span class="text-danger">*</span></label>
                <input th:field="*{title}" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-xs text-danger mt-1"></p></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Value (৳)</label>
                <input type="number" step="0.01" min="0" th:field="*{value}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Stage</label>
                <select th:field="*{stage}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option th:each="s : ${stages}" th:value="${s}" th:text="${s.label}"></option></select></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Probability (%)</label>
                <input type="number" min="0" max="100" th:field="*{probability}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Expected close date</label>
                <input type="date" th:field="*{expectedCloseDate}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Contact</label>
                <select name="contactId" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option value="">None</option>
                    <option th:each="c : ${contacts}" th:value="${c.id}" th:text="${c.fullName}" th:selected="${deal.contact != null and deal.contact.id == c.id}"></option></select></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Company</label>
                <select name="companyId" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option value="">None</option>
                    <option th:each="co : ${companies}" th:value="${co.id}" th:text="${co.name}" th:selected="${deal.company != null and deal.company.id == co.id}"></option></select></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Owner</label>
                <input th:field="*{owner}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
            <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Win/Loss reason</label>
                <input th:field="*{wonLostReason}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></div>
        </div>
        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save Deal</button>
            <a th:href="@{/crm/deals}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
