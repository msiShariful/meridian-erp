<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop · Meridian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { navy: '#0f172a', brand: '#6366f1', 'brand-dark': '#4f46e5' },
            fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-slate-100 text-slate-800">

<div th:replace="~{shop/fragments :: nav(${cartCount})}"></div>

<main class="max-w-6xl mx-auto px-4 py-10">

    <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-extrabold text-navy">Browse our products</h1>
            <p class="text-slate-500 mt-1">Quality products delivered across Bangladesh.</p>
        </div>
        <form th:action="@{/shop}" method="get" class="relative w-full sm:w-72">
            <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
            <input type="search" name="q" th:value="${q}" placeholder="Search products…"
                   class="w-full pl-9 pr-3 py-2.5 text-sm rounded-lg border border-slate-300 bg-white focus:border-brand focus:ring-1 focus:ring-brand outline-none">
        </form>
    </div>

    <div th:if="${products.isEmpty()}" class="text-center py-20 bg-white rounded-2xl border border-slate-200">
        <p class="text-slate-500">No products found.</p>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
        <div th:each="product : ${products}" class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col hover:shadow-md transition-shadow">
            <a th:href="@{/shop/product/{id}(id=${product.id})}" class="block aspect-square bg-slate-100 flex items-center justify-center overflow-hidden">
                <img th:if="${product.image}" th:src="${product.image}" th:alt="${product.name}" class="w-full h-full object-cover">
                <span th:unless="${product.image}" class="text-4xl font-extrabold text-slate-300" th:text="${product.initials}">AB</span>
            </a>
            <div class="p-4 flex flex-col flex-1">
                <a th:href="@{/shop/product/{id}(id=${product.id})}" class="font-semibold text-slate-800 hover:text-brand line-clamp-2" th:text="${product.name}">Product</a>
                <p class="text-lg font-bold text-navy mt-2">৳ <span th:text="${#numbers.formatInteger(product.sellingPrice, 1, 'COMMA')}">0</span></p>
                <form th:action="@{/shop/cart/add}" method="post" class="mt-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <input type="hidden" name="qty" value="1">
                    <button type="submit" th:disabled="${product.stockQuantity == 0}"
                            th:classappend="${product.stockQuantity == 0} ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-brand hover:bg-brand-dark text-white'"
                            class="w-full py-2 rounded-lg text-sm font-medium">
                        <span th:text="${product.stockQuantity == 0} ? 'Out of stock' : 'Add to cart'">Add to cart</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer class="max-w-6xl mx-auto px-4 py-8 text-center text-xs text-slate-400">
    Meridian Shop &copy; 2026 · Powered by Meridian ERP
</footer>
</body>
</html>
