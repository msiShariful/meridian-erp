<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Storefront top navigation: brand + cart link with item count -->
<header th:fragment="nav(cartCount)" class="sticky top-0 z-20 bg-navy text-white">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
        <a th:href="@{/shop}" class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-brand flex items-center justify-center font-extrabold">M</div>
            <span class="font-bold text-lg tracking-tight">Meridian Shop</span>
        </a>
        <a th:href="@{/shop/cart}" class="relative flex items-center gap-2 px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            Cart
            <span th:if="${cartCount > 0}" class="ml-1 min-w-[20px] h-5 px-1 rounded-full bg-brand text-white text-xs font-bold flex items-center justify-center" th:text="${cartCount}">0</span>
        </a>
    </div>
</header>

</body>
</html>
