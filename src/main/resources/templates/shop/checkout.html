<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout · Meridian Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { navy: '#0f172a', brand: '#6366f1', 'brand-dark': '#4f46e5' },
            fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-slate-100 text-slate-800">

<div th:replace="~{shop/fragments :: nav(${cartCount})}"></div>

<main class="max-w-5xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-extrabold text-navy mb-6">Checkout</h1>

    <form th:action="@{/shop/checkout}" method="post" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <!-- Details -->
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-2xl border border-slate-200 p-6 space-y-5">
                <h2 class="font-bold text-slate-800">Shipping Details</h2>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Full name <span class="text-red-500">*</span></label>
                    <input name="customerName" required class="w-full px-3 py-2.5 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                    <input type="email" name="customerEmail" class="w-full px-3 py-2.5 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Shipping address <span class="text-red-500">*</span></label>
                    <textarea name="shippingAddress" rows="3" required class="w-full px-3 py-2.5 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Shipping method</label>
                    <select name="shippingMethodId" class="w-full px-3 py-2.5 rounded-lg border border-slate-300 focus:border-brand outline-none">
                        <option th:each="m : ${shippingMethods}" th:value="${m.id}"
                                th:text="${m.name + ' — ৳ ' + #numbers.formatInteger(m.rate, 1, 'COMMA') + (m.freeAbove != null ? ' (free above ৳ ' + #numbers.formatInteger(m.freeAbove, 1, 'COMMA') + ')' : '')}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Payment method <span class="text-red-500">*</span></label>
                    <div class="flex gap-4 text-sm">
                        <label class="flex items-center gap-2"><input type="radio" name="paymentMethod" value="COD" checked class="text-brand focus:ring-brand"> Cash on Delivery</label>
                        <label class="flex items-center gap-2"><input type="radio" name="paymentMethod" value="Card" class="text-brand focus:ring-brand"> Card (dummy)</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary -->
        <div class="space-y-4">
            <div class="bg-white rounded-2xl border border-slate-200 p-6">
                <h2 class="font-bold text-slate-800 mb-4">Order Summary</h2>
                <ul class="text-sm space-y-2 mb-4">
                    <li th:each="line : ${lines}" class="flex justify-between gap-2">
                        <span class="text-slate-600 truncate"><span th:text="${line.productName}">Product</span> × <span th:text="${line.quantity}">1</span></span>
                        <span class="text-slate-700 whitespace-nowrap">৳ <span th:text="${#numbers.formatInteger(line.lineTotal, 1, 'COMMA')}">0</span></span>
                    </li>
                </ul>
                <dl class="text-sm space-y-2 border-t border-slate-100 pt-3">
                    <div class="flex justify-between"><dt class="text-slate-500">Subtotal</dt><dd class="text-slate-700">৳ <span th:text="${#numbers.formatInteger(subtotal, 1, 'COMMA')}">0</span></dd></div>
                    <div class="flex justify-between" th:if="${discount != null and discount.signum() > 0}">
                        <dt class="text-slate-500">Discount <span th:if="${couponCode}" class="text-xs text-slate-400" th:text="'(' + ${couponCode} + ')'"></span></dt>
                        <dd class="text-emerald-600">– ৳ <span th:text="${#numbers.formatInteger(discount, 1, 'COMMA')}">0</span></dd>
                    </div>
                    <div class="flex justify-between text-xs text-slate-400"><dt>Shipping</dt><dd>calculated on placement</dd></div>
                </dl>
                <button type="submit" class="w-full mt-5 py-2.5 rounded-lg bg-brand hover:bg-brand-dark text-white font-semibold">Place order</button>
                <a th:href="@{/shop/cart}" class="block text-center mt-2 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 text-sm font-medium hover:bg-slate-50">Back to cart</a>
            </div>
        </div>
    </form>
</main>

<footer class="max-w-6xl mx-auto px-4 py-8 text-center text-xs text-slate-400">
    Meridian Shop &copy; 2026 · Powered by Meridian ERP
</footer>
</body>
</html>
