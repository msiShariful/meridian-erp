<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Stock Movements</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('Inventory', '', 'Stock')}"></div>

    <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-800">Stock</h1>
        <p class="text-slate-500 text-sm mt-1">Record adjustments and review movement history.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Movement history -->
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="px-5 py-4 border-b border-slate-100">
                    <h2 class="font-semibold text-slate-800">Movement History</h2>
                </div>
                <div th:if="${movements.isEmpty()}" class="px-5 py-10 text-center text-sm text-slate-400">No stock movements recorded yet.</div>

                <table th:unless="${movements.isEmpty()}" class="w-full text-sm">
                    <thead class="bg-slate-50 text-slate-500 text-left">
                        <tr>
                            <th class="px-5 py-3 font-medium">Product</th>
                            <th class="px-5 py-3 font-medium">Type</th>
                            <th class="px-5 py-3 font-medium">Qty</th>
                            <th class="px-5 py-3 font-medium">Warehouse</th>
                            <th class="px-5 py-3 font-medium">Reason</th>
                            <th class="px-5 py-3 font-medium">Date</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="m : ${movements.content}" class="hover:bg-slate-50">
                            <td class="px-5 py-3 font-medium text-slate-700" th:text="${m.product != null ? m.product.name : '—'}">Product</td>
                            <td class="px-5 py-3">
                                <span th:replace="~{layout/components :: badge(${m.type.label}, ${m.type.color})}"></span>
                            </td>
                            <td class="px-5 py-3 text-slate-700" th:text="${m.quantity}">0</td>
                            <td class="px-5 py-3 text-slate-600" th:text="${m.warehouse != null ? m.warehouse.name : '—'}">Warehouse</td>
                            <td class="px-5 py-3 text-slate-500" th:text="${m.reason} ?: '—'">Reason</td>
                            <td class="px-5 py-3 text-slate-500 whitespace-nowrap" th:text="${m.createdAt != null ? #temporals.format(m.createdAt, 'dd MMM yyyy') : '—'}">Date</td>
                        </tr>
                    </tbody>
                </table>

                <div th:replace="~{layout/components :: pagination(${movements}, '/inventory/stock', null)}"></div>
            </div>
        </div>

        <!-- Adjustment form + low stock -->
        <div class="space-y-6">
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6" sec:authorize="hasAuthority('INVENTORY_EDIT')">
                <h2 class="font-semibold text-slate-800 mb-4">Stock Adjustment</h2>
                <form th:action="@{/inventory/stock/adjust}" method="post" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Product <span class="text-danger">*</span></label>
                        <select name="productId" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                            <option value="">Select product…</option>
                            <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name} + ' (' + ${p.sku} + ')'"></option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Warehouse</label>
                        <select name="warehouseId" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                            <option value="">— None —</option>
                            <option th:each="w : ${warehouses}" th:value="${w.id}" th:text="${w.name}"></option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Type <span class="text-danger">*</span></label>
                        <select name="type" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                            <option th:each="t : ${types}" th:value="${t}" th:text="${t.label}"></option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Quantity <span class="text-danger">*</span></label>
                        <input type="number" name="quantity" min="1" value="1" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Reason</label>
                        <input name="reason" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Reference</label>
                        <input name="reference" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    </div>
                    <button type="submit" class="w-full bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Record Movement</button>
                </form>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                <h2 class="font-semibold text-slate-800 mb-4">Low Stock Alerts</h2>
                <p th:if="${lowStock.isEmpty()}" class="text-sm text-slate-400">All products are above their reorder levels.</p>
                <ul class="space-y-3">
                    <li th:each="p : ${lowStock}" class="flex items-center justify-between gap-3">
                        <a th:href="@{/inventory/products/{id}(id=${p.id})}" class="text-sm font-medium text-slate-700 hover:text-brand truncate" th:text="${p.name}">Product</a>
                        <span class="flex items-center gap-2 shrink-0">
                            <span class="text-xs text-slate-400" th:text="${p.stockQuantity} + ' / ' + ${p.reorderLevel}">0 / 0</span>
                            <span th:replace="~{layout/components :: badge(${p.stockStatus}, ${p.stockStatusColor})}"></span>
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
</body>
</html>
