<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Products</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('Inventory', '', 'Products')}"></div>

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Products</h1>
            <p class="text-slate-500 text-sm mt-1">Manage your catalogue and stock levels.</p>
        </div>
        <a sec:authorize="hasAuthority('INVENTORY_EDIT')" th:href="@{/inventory/products/new}" class="px-4 py-2 text-sm font-medium rounded-lg bg-brand hover:bg-brand-dark text-white">+ New Product</a>
    </div>

    <div th:replace="~{layout/components :: listToolbar('/inventory/products', ${q})}"></div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div th:if="${products.isEmpty()}" th:replace="~{layout/components :: emptyState('No products found', 'Add your first product to start tracking inventory.', '/inventory/products/new', '+ New Product')}"></div>

        <table th:unless="${products.isEmpty()}" class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-left">
                <tr>
                    <th class="px-5 py-3 font-medium">Product</th>
                    <th class="px-5 py-3 font-medium">SKU</th>
                    <th class="px-5 py-3 font-medium">Category</th>
                    <th class="px-5 py-3 font-medium">Cost</th>
                    <th class="px-5 py-3 font-medium">Selling</th>
                    <th class="px-5 py-3 font-medium">Stock</th>
                    <th class="px-5 py-3 font-medium text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="p : ${products.content}" class="hover:bg-slate-50">
                    <td class="px-5 py-3">
                        <a th:href="@{/inventory/products/{id}(id=${p.id})}" class="flex items-center gap-3 group">
                            <span class="w-9 h-9 rounded-lg bg-brand/15 text-brand flex items-center justify-center text-xs font-semibold overflow-hidden">
                                <img th:if="${p.image}" th:src="@{${p.image}}" class="w-full h-full object-cover" alt="">
                                <span th:unless="${p.image}" th:text="${p.initials}">AB</span>
                            </span>
                            <span class="font-medium text-slate-700 group-hover:text-brand" th:text="${p.name}">Name</span>
                        </a>
                    </td>
                    <td class="px-5 py-3 text-slate-500 font-mono text-xs" th:text="${p.sku}">SKU</td>
                    <td class="px-5 py-3 text-slate-600" th:text="${p.category != null ? p.category.name : '—'}">Category</td>
                    <td class="px-5 py-3 text-slate-600">৳ <span th:text="${#numbers.formatInteger(p.costPrice, 1, 'COMMA')}">0</span></td>
                    <td class="px-5 py-3 text-slate-700">৳ <span th:text="${#numbers.formatInteger(p.sellingPrice, 1, 'COMMA')}">0</span></td>
                    <td class="px-5 py-3 whitespace-nowrap">
                        <span class="text-slate-700 mr-2" th:text="${p.stockQuantity}">0</span>
                        <span th:replace="~{layout/components :: badge(${p.stockStatus}, ${p.stockStatusColor})}"></span>
                    </td>
                    <td class="px-5 py-3 text-right whitespace-nowrap">
                        <a sec:authorize="hasAuthority('INVENTORY_EDIT')" th:href="@{/inventory/products/{id}/edit(id=${p.id})}" class="text-slate-400 hover:text-brand px-1.5" title="Edit">✎</a>
                        <form sec:authorize="hasAuthority('INVENTORY_EDIT')" th:action="@{/inventory/products/{id}/delete(id=${p.id})}" method="post" class="inline" data-confirm="Delete this product?">
                            <button class="text-slate-400 hover:text-danger px-1.5" title="Delete">🗑</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:replace="~{layout/components :: pagination(${products}, '/inventory/products', ${q})}"></div>
    </div>
</div>
</body>
</html>
