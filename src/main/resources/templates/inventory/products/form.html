<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">Product</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('Products', '/inventory/products', ${pageTitle})}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6" th:text="${pageTitle}">New Product</h1>

    <form th:action="@{/inventory/products/save}" th:object="${product}" method="post" enctype="multipart/form-data" class="max-w-3xl">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{sku}">
        <input type="hidden" th:field="*{image}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">

            <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Product name <span class="text-danger">*</span></label>
                <input th:field="*{name}" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-xs text-danger mt-1"></p>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">SKU</label>
                <input type="text" th:value="${product.sku} ?: ${nextSku}" disabled class="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50 text-slate-500 font-mono text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Category</label>
                <select name="categoryId" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option value="">Select…</option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                            th:selected="${product.category != null and product.category.id == c.id}"></option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Cost price (৳)</label>
                <input type="number" step="0.01" min="0" th:field="*{costPrice}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Selling price (৳)</label>
                <input type="number" step="0.01" min="0" th:field="*{sellingPrice}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Stock quantity</label>
                <input type="number" min="0" th:field="*{stockQuantity}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Reorder level</label>
                <input type="number" min="0" th:field="*{reorderLevel}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Unit</label>
                <input th:field="*{unit}" placeholder="pcs, kg, box…" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Barcode</label>
                <input th:field="*{barcode}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
            </div>

            <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Product image</label>
                <input type="file" name="imageFile" accept="image/*" class="w-full text-sm text-slate-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-indigo-50 file:text-brand">
            </div>
            <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
                <textarea th:field="*{description}" rows="3" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none"></textarea>
            </div>
        </div>

        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save Product</button>
            <a th:href="@{/inventory/products}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
