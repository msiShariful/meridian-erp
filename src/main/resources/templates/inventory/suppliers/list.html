<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Suppliers</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('Inventory', '', 'Suppliers')}"></div>

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Suppliers</h1>
            <p class="text-slate-500 text-sm mt-1">Vendors that supply your inventory.</p>
        </div>
        <a sec:authorize="hasAuthority('INVENTORY_EDIT')" th:href="@{/inventory/suppliers/new}" class="px-4 py-2 text-sm font-medium rounded-lg bg-brand hover:bg-brand-dark text-white">+ New Supplier</a>
    </div>

    <div th:replace="~{layout/components :: listToolbar('/inventory/suppliers', ${q})}"></div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div th:if="${suppliers.isEmpty()}" th:replace="~{layout/components :: emptyState('No suppliers yet', 'Add a supplier to manage your procurement.', '/inventory/suppliers/new', '+ New Supplier')}"></div>

        <table th:unless="${suppliers.isEmpty()}" class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-left">
                <tr>
                    <th class="px-5 py-3 font-medium">Supplier</th>
                    <th class="px-5 py-3 font-medium">Contact</th>
                    <th class="px-5 py-3 font-medium">Rating</th>
                    <th class="px-5 py-3 font-medium">Payment Terms</th>
                    <th class="px-5 py-3 font-medium text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="s : ${suppliers.content}" class="hover:bg-slate-50">
                    <td class="px-5 py-3">
                        <a th:href="@{/inventory/suppliers/{id}(id=${s.id})}" class="flex items-center gap-3 group">
                            <span class="w-8 h-8 rounded-full bg-brand/15 text-brand flex items-center justify-center text-xs font-semibold" th:text="${s.initials}">AB</span>
                            <span class="font-medium text-slate-700 group-hover:text-brand" th:text="${s.name}">Name</span>
                        </a>
                    </td>
                    <td class="px-5 py-3 text-slate-600">
                        <span th:text="${s.contactPerson} ?: '—'">Contact</span>
                        <span class="block text-xs text-slate-400" th:text="${s.phone}">phone</span>
                    </td>
                    <td class="px-5 py-3 whitespace-nowrap">
                        <span th:each="i : ${#numbers.sequence(1,5)}"
                              th:classappend="${i <= s.rating} ? 'text-amber-400' : 'text-slate-200'">★</span>
                    </td>
                    <td class="px-5 py-3 text-slate-600" th:text="${s.paymentTerms} ?: '—'">Terms</td>
                    <td class="px-5 py-3 text-right whitespace-nowrap">
                        <a sec:authorize="hasAuthority('INVENTORY_EDIT')" th:href="@{/inventory/suppliers/{id}/edit(id=${s.id})}" class="text-slate-400 hover:text-brand px-1.5" title="Edit">✎</a>
                        <form sec:authorize="hasAuthority('INVENTORY_EDIT')" th:action="@{/inventory/suppliers/{id}/delete(id=${s.id})}" method="post" class="inline" data-confirm="Delete this supplier?">
                            <button class="text-slate-400 hover:text-danger px-1.5" title="Delete">🗑</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:replace="~{layout/components :: pagination(${suppliers}, '/inventory/suppliers', ${q})}"></div>
    </div>
</div>
</body>
</html>
