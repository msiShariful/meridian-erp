<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">Department</title></head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Departments', '/hrm/departments', ${pageTitle})}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6" th:text="${pageTitle}">Department</h1>

    <form th:action="@{/hrm/departments/save}" th:object="${department}" method="post" class="max-w-2xl">
        <input type="hidden" th:field="*{id}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 gap-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Department name <span class="text-danger">*</span></label>
                <input th:field="*{name}" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-xs text-danger mt-1"></p>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Department head</label>
                <input th:field="*{head}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
                <textarea th:field="*{description}" rows="3" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none"></textarea>
            </div>
        </div>
        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save Department</button>
            <a th:href="@{/hrm/departments}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
