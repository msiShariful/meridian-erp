<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Performance Reviews</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('HRM', '', 'Performance')}"></div>

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Performance Reviews</h1>
            <p class="text-slate-500 text-sm mt-1">Track employee evaluations and goals.</p>
        </div>
        <a sec:authorize="hasAuthority('HRM_EDIT')" th:href="@{/hrm/performance/new}" class="px-4 py-2 text-sm font-medium rounded-lg bg-brand hover:bg-brand-dark text-white">+ New Review</a>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div th:if="${reviews.isEmpty()}"><div th:replace="~{layout/components :: emptyState('No reviews yet', 'Create your first performance review.', '/hrm/performance/new', '+ New Review')}"></div></div>

        <table th:unless="${reviews.isEmpty()}" class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-left">
                <tr>
                    <th class="px-5 py-3 font-medium">Employee</th>
                    <th class="px-5 py-3 font-medium">Period</th>
                    <th class="px-5 py-3 font-medium">Rating</th>
                    <th class="px-5 py-3 font-medium">Goals</th>
                    <th class="px-5 py-3 font-medium text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="r : ${reviews.content}" class="hover:bg-slate-50">
                    <td class="px-5 py-3 text-slate-700" th:text="${r.employee != null ? r.employee.fullName : '—'}">Name</td>
                    <td class="px-5 py-3 text-slate-600" th:text="${r.period} ?: '—'">Q1-2026</td>
                    <td class="px-5 py-3 whitespace-nowrap">
                        <span th:each="i : ${#numbers.sequence(1,5)}"
                              th:classappend="${i <= r.rating} ? 'text-amber-400' : 'text-slate-200'">★</span>
                    </td>
                    <td class="px-5 py-3 text-slate-600 max-w-xs truncate" th:text="${r.goals} ?: '—'">Goals</td>
                    <td class="px-5 py-3 text-right whitespace-nowrap">
                        <a sec:authorize="hasAuthority('HRM_EDIT')" th:href="@{/hrm/performance/{id}/edit(id=${r.id})}" class="text-slate-400 hover:text-brand px-1.5" title="Edit">✎</a>
                        <form sec:authorize="hasAuthority('HRM_EDIT')" th:action="@{/hrm/performance/{id}/delete(id=${r.id})}" method="post" class="inline" data-confirm="Delete this review?">
                            <button class="text-slate-400 hover:text-danger px-1.5" title="Delete">🗑</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:replace="~{layout/components :: pagination(${reviews}, '/hrm/performance', null)}"></div>
    </div>
</div>
</body>
</html>
