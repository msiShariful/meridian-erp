<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>My Profile</title></head>
<body>
<div layout:fragment="content">

    <nav class="text-sm text-slate-400 mb-2">
        <a th:href="@{/dashboard}" class="hover:text-brand">Dashboard</a> <span class="mx-1">/</span>
        <span class="text-slate-600">Profile</span>
    </nav>
    <h1 class="text-2xl font-bold text-slate-800 mb-6">My Profile</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Avatar card -->
        <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm text-center">
            <div class="w-24 h-24 mx-auto rounded-full bg-brand/15 text-brand flex items-center justify-center text-3xl font-bold overflow-hidden">
                <img th:if="${profile.avatar}" th:src="@{${profile.avatar}}" class="w-full h-full object-cover" alt="avatar">
                <span th:unless="${profile.avatar}" th:text="${profile.initials}">U</span>
            </div>
            <h2 class="mt-4 font-semibold text-slate-800" th:text="${profile.fullName}">Name</h2>
            <p class="text-sm text-slate-500" th:text="${profile.jobTitle}">Title</p>
            <span class="inline-block mt-2 px-3 py-1 rounded-full bg-indigo-100 text-brand text-xs font-medium"
                  th:text="${profile.primaryRoleDisplay}">Role</span>

            <form th:action="@{/profile/avatar}" method="post" enctype="multipart/form-data" class="mt-6 text-left">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Change avatar</label>
                <input type="file" name="avatar" accept="image/*" required
                       class="w-full text-sm text-slate-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-indigo-50 file:text-brand">
                <button type="submit" class="mt-3 w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2 rounded-lg text-sm">Upload</button>
            </form>
        </div>

        <!-- Details + password -->
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                <h2 class="font-semibold text-slate-800 mb-4">Personal Information</h2>
                <form th:action="@{/profile}" method="post" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Full name</label>
                        <input name="fullName" th:value="${profile.fullName}" required
                               class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                        <input th:value="${profile.email}" disabled
                               class="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50 text-slate-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Phone</label>
                        <input name="phone" th:value="${profile.phone}"
                               class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Job title</label>
                        <input name="jobTitle" th:value="${profile.jobTitle}"
                               class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                    </div>
                    <div class="sm:col-span-2">
                        <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2 rounded-lg">Save changes</button>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                <h2 class="font-semibold text-slate-800 mb-4">Change Password</h2>
                <form th:action="@{/profile/password}" method="post" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Current</label>
                        <input type="password" name="currentPassword" required
                               class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">New</label>
                        <input type="password" name="newPassword" required minlength="6"
                               class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Confirm</label>
                        <input type="password" name="confirmPassword" required minlength="6"
                               class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                    </div>
                    <div class="sm:col-span-3">
                        <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white font-semibold px-5 py-2 rounded-lg">Update password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
