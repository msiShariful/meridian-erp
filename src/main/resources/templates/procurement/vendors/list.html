<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Vendors</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('Procurement', '', 'Vendors')}"></div>

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Vendors</h1>
            <p class="text-slate-500 text-sm mt-1">Manage your supplier network and ratings.</p>
        </div>
        <div class="flex gap-2">
            <a sec:authorize="hasAuthority('PROCUREMENT_EDIT')" th:href="@{/procurement/vendors/new}" class="px-4 py-2 text-sm font-medium rounded-lg bg-brand hover:bg-brand-dark text-white">+ New Vendor</a>
        </div>
    </div>

    <div th:replace="~{layout/components :: listToolbar('/procurement/vendors', ${q})}"></div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div th:if="${vendors.isEmpty()}"><div th:replace="~{layout/components :: emptyState('No vendors found', 'Add your first vendor to start procurement.', '/procurement/vendors/new', '+ New Vendor')}"></div></div>

        <table th:unless="${vendors.isEmpty()}" class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-left">
                <tr>
                    <th class="px-5 py-3 font-medium">Vendor</th>
                    <th class="px-5 py-3 font-medium">Contact</th>
                    <th class="px-5 py-3 font-medium">Rating</th>
                    <th class="px-5 py-3 font-medium">Payment Terms</th>
                    <th class="px-5 py-3 font-medium">Status</th>
                    <th class="px-5 py-3 font-medium text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="vendor : ${vendors.content}" class="hover:bg-slate-50">
                    <td class="px-5 py-3">
                        <a th:href="@{/procurement/vendors/{id}(id=${vendor.id})}" class="flex items-center gap-3 group">
                            <span class="w-8 h-8 rounded-full bg-brand/15 text-brand flex items-center justify-center text-xs font-semibold" th:text="${vendor.initials}">AB</span>
                            <span>
                                <span class="font-medium text-slate-700 group-hover:text-brand" th:text="${vendor.name}">Name</span>
                                <span class="block text-xs text-slate-400" th:text="${vendor.email}">email</span>
                            </span>
                        </a>
                    </td>
                    <td class="px-5 py-3 text-slate-600" th:text="${vendor.contactPerson} ?: '—'">Contact</td>
                    <td class="px-5 py-3 whitespace-nowrap">
                        <span th:each="i : ${#numbers.sequence(1,5)}"
                              th:classappend="${i <= vendor.rating} ? 'text-amber-400' : 'text-slate-200'">★</span>
                    </td>
                    <td class="px-5 py-3 text-slate-600" th:text="${vendor.paymentTerms} ?: '—'">Terms</td>
                    <td class="px-5 py-3">
                        <span th:replace="~{layout/components :: badge(${vendor.status.label}, ${vendor.status.color})}"></span>
                    </td>
                    <td class="px-5 py-3 text-right whitespace-nowrap">
                        <a sec:authorize="hasAuthority('PROCUREMENT_EDIT')" th:href="@{/procurement/vendors/{id}/edit(id=${vendor.id})}" class="text-slate-400 hover:text-brand px-1.5" title="Edit">✎</a>
                        <form sec:authorize="hasAuthority('PROCUREMENT_EDIT')" th:action="@{/procurement/vendors/{id}/delete(id=${vendor.id})}" method="post" class="inline" data-confirm="Delete this vendor?">
                            <button class="text-slate-400 hover:text-danger px-1.5" title="Delete">🗑</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:replace="~{layout/components :: pagination(${vendors}, '/procurement/vendors', ${q})}"></div>
    </div>
</div>
</body>
</html>
