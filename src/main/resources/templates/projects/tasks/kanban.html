<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Task Board</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div layout:fragment="content">
    <div th:replace="~{layout/components :: breadcrumb('Projects', '/projects', 'Task Board')}"></div>
    <div class="flex items-center justify-between mb-6">
        <div><h1 class="text-2xl font-bold text-slate-800">Task Board</h1>
            <p class="text-slate-500 text-sm mt-1">Drag tasks across columns to update their status.</p></div>
        <div class="flex gap-2">
            <a th:href="@{/projects/tasks/list}" class="px-4 py-2 text-sm font-medium rounded-lg bg-white border border-slate-300 hover:bg-slate-50">List view</a>
            <a sec:authorize="hasAuthority('PROJECTS_EDIT')" th:href="@{/projects/tasks/new}" class="px-4 py-2 text-sm font-medium rounded-lg bg-brand hover:bg-brand-dark text-white">+ New Task</a>
        </div>
    </div>

    <div class="flex gap-4 overflow-x-auto pb-4">
        <div th:each="col : ${board}" class="flex-shrink-0 w-72" th:attr="data-status=${col.key}"
             ondragover="event.preventDefault(); this.classList.add('ring-2','ring-brand/40')"
             ondragleave="this.classList.remove('ring-2','ring-brand/40')"
             ondrop="dropTask(event, this)">
            <div class="flex items-center justify-between mb-2 px-1">
                <h3 class="font-semibold text-slate-700 text-sm" th:text="${col.key.label}">Status</h3>
                <span class="text-xs bg-slate-200 text-slate-600 rounded-full px-2 py-0.5" th:text="${col.value.size()}">0</span>
            </div>
            <div class="space-y-3 min-h-[120px] rounded-xl bg-slate-50 p-2">
                <div th:each="t : ${col.value}" class="bg-white rounded-lg border border-slate-200 p-3 shadow-sm cursor-move hover:shadow-md"
                     draggable="true" th:attr="data-id=${t.id}"
                     ondragstart="event.dataTransfer.setData('text/plain', this.getAttribute('data-id'))">
                    <a th:href="@{/projects/tasks/{id}(id=${t.id})}" class="font-medium text-slate-700 text-sm hover:text-brand" th:text="${t.title}">Title</a>
                    <p class="text-xs text-slate-400 mt-1" th:text="${t.project != null ? t.project.name : ''}">Project</p>
                    <div class="flex items-center justify-between mt-2">
                        <span th:replace="~{layout/components :: badge(${t.priority.label}, ${t.priority.color})}"></span>
                        <span class="text-xs text-slate-500" th:text="${t.assignee} ?: 'Unassigned'">assignee</span>
                    </div>
                </div>
                <p th:if="${col.value.isEmpty()}" class="text-center text-xs text-slate-300 py-6">Drop tasks here</p>
            </div>
        </div>
    </div>

    <script layout:fragment="scripts">
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
        function dropTask(ev, col) {
            ev.preventDefault();
            col.classList.remove('ring-2','ring-brand/40');
            const id = ev.dataTransfer.getData('text/plain');
            const status = col.getAttribute('data-status');
            const card = document.querySelector(`[data-id="${id}"]`);
            if (card) col.querySelector('.space-y-3').prepend(card);
            fetch(`/projects/tasks/${id}/status?status=${status}`, { method: 'POST', headers: { [csrfHeader]: csrfToken } })
                .then(r => { if (!r.ok) location.reload(); });
        }
    </script>
</div>
</body>
</html>
