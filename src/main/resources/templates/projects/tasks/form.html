<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="${pageTitle}">Task</title></head>
<body>
<div layout:fragment="content">

    <div th:replace="~{layout/components :: breadcrumb('Tasks', '/projects/tasks/list', ${pageTitle})}"></div>
    <h1 class="text-2xl font-bold text-slate-800 mb-6" th:text="${pageTitle}">New Task</h1>

    <form th:action="@{/projects/tasks/save}" th:object="${task}" method="post" class="max-w-3xl">
        <input type="hidden" th:field="*{id}">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">

            <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Title <span class="text-danger">*</span></label>
                <input th:field="*{title}" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-xs text-danger mt-1"></p>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Project <span class="text-danger">*</span></label>
                <select name="projectId" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option value="">— Select project —</option>
                    <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}"
                            th:selected="${task.project != null and task.project.id == p.id}"></option>
                </select>
                <p th:if="${#fields.hasErrors('project')}" th:errors="*{project}" class="text-xs text-danger mt-1"></p>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Assignee</label>
                <input th:field="*{assignee}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Status</label>
                <select th:field="*{status}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"></option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Priority</label>
                <select th:field="*{priority}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand outline-none">
                    <option th:each="p : ${priorities}" th:value="${p}" th:text="${p.label}"></option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Due date</label>
                <input type="date" th:field="*{dueDate}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Labels (comma-separated)</label>
                <input th:field="*{labels}" placeholder="backend, urgent" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none">
            </div>
            <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
                <textarea th:field="*{description}" rows="4" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand focus:ring-1 focus:ring-brand outline-none"></textarea>
            </div>
        </div>

        <div class="flex gap-2 mt-5">
            <button type="submit" class="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-lg">Save Task</button>
            <a th:href="@{/projects/tasks/list}" class="px-5 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
